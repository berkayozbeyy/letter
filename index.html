<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Incoming Transmission...</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        /* Base Reset & Font */
        * {
            box-sizing: border-box;
            image-rendering: pixelated; /* Keeps everything lookin' crunchy and retro */
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            font-family: 'VT323', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: #fff;
        }

        /* 8-Bit Office Background */
        .office-container {
            width: 800px;
            height: 500px;
            background-color: #2c3e50; /* Office walls */
            border: 10px solid #fff;
            position: relative;
            box-shadow: 0 0 0 10px #000;
            overflow: hidden;
        }
        .floor {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 150px;
            background-color: #7f8c8d; /* Gray carpet floor */
            border-top: 8px solid #34495e;
        }
        .window {
            position: absolute;
            top: 40px;
            left: 320px;
            width: 160px;
            height: 100px;
            background-color: #3498db;
            border: 8px solid #bdc3c7;
            box-shadow: inset -10px -10px 0 #2980b9;
        }
        .desk {
            position: absolute;
            bottom: 110px;
            right: 40px;
            width: 140px;
            height: 80px;
            background-color: #d35400;
            border: 6px solid #a04000;
            box-shadow: -10px 10px 0 rgba(0,0,0,0.2);
        }

        /* Characters (8-Bit SVGs) */
        .character {
            position: absolute;
            bottom: 120px;
        }
        
        /* Boss Agent (Left) */
        .boss {
            left: 60px;
            width: 90px;
            height: 160px;
        }

        /* Girl Agent (Right) */
        .girl {
            right: 180px;
            width: 90px;
            height: 160px;
        }

        /* Animations */
        
        /* The Envelope floating from boss to girl */
        .envelope {
            position: absolute;
            width: 40px;
            height: 25px;
            background-color: #f1c40f;
            border: 3px solid #000;
            left: 140px;
            bottom: 230px;
            opacity: 0;
            z-index: 5;
            animation: flyLetter 2s steps(20) 1.5s forwards;
        }
        /* Triangle flap of the envelope */
        .envelope::after {
            content: '';
            position: absolute;
            top: 0;
            left: 5px;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 12px solid #d4ac0d;
        }

        @keyframes flyLetter {
            0% {
                opacity: 0;
                transform: translate(0, 0) scale(1);
            }
            10% { opacity: 1; }
            90% {
                transform: translate(400px, -20px) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(440px, 10px) scale(0);
                opacity: 0;
            }
        }

        /* The Message Box Pop-up */
        .message-modal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 500px;
            background-color: #fff;
            border: 8px solid #000;
            padding: 20px;
            color: #000;
            box-shadow: 10px 10px 0 #000;
            z-index: 10;
            animation: openMessage 0.5s steps(5) 3.5s forwards;
        }
        .message-header {
            background-color: #e74c3c;
            color: #fff;
            padding: 5px 10px;
            font-size: 24px;
            margin: -20px -20px 20px -20px;
            border-bottom: 6px solid #000;
        }
        .message-body {
            font-size: 28px;
            line-height: 1.2;
            white-space: pre-wrap;
        }
        .cursor {
            display: inline-block;
            width: 10px;
            height: 20px;
            background-color: #000;
            animation: blink 0.8s steps(2) infinite;
        }

        @keyframes openMessage {
            to {
                transform: translate(-50%, -50%) scale(1);
            }
        }
        @keyframes blink {
            to { opacity: 0; }
        }

        /* Scanline effect for retro look */
        .scanlines {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%);
            background-size: 100% 4px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="office-container">
        <div class="floor"></div>
        <div class="window"></div>
        <div class="desk"></div>

        <div class="character boss">
            <svg viewBox="0 0 30 50" width="100%" height="100%">
                <rect x="8" y="36" width="4" height="14" fill="#1a1a1a"/>
                <rect x="18" y="36" width="4" height="14" fill="#1a1a1a"/>
                <rect x="6" y="16" width="18" height="22" fill="#2c3e50"/>
                <rect x="6" y="16" width="18" height="20" fill="#111111"/>
                <rect x="13" y="16" width="4" height="4" fill="#ffffff"/>
                <rect x="14" y="20" width="2" height="6" fill="#e74c3c"/> <rect x="2" y="16" width="4" height="16" fill="#111111"/>
                <rect x="24" y="16" width="4" height="16" fill="#111111"/>
                <rect x="8" y="2" width="14" height="14" fill="#f5cba7"/>
                <rect x="8" y="0" width="14" height="4" fill="#111111"/>
                <rect x="6" y="2" width="4" height="6" fill="#111111"/>
                <rect x="20" y="2" width="4" height="4" fill="#111111"/>
                <rect x="8" y="6" width="14" height="3" fill="#000000"/>
            </svg>
        </div>

        <div class="character girl">
            <svg viewBox="0 0 30 50" width="100%" height="100%">
                <rect x="8" y="36" width="4" height="14" fill="#333"/>
                <rect x="18" y="36" width="4" height="14" fill="#333"/>
                <rect x="6" y="16" width="18" height="22" fill="#ffffff"/>
                <rect x="6" y="16" width="18" height="20" fill="#7f8c8d"/>
                <rect x="2" y="16" width="4" height="14" fill="#7f8c8d"/>
                <rect x="24" y="16" width="4" height="14" fill="#7f8c8d"/>
                <rect x="8" y="4" width="14" height="12" fill="#f5cba7"/>
                <rect x="6" y="0" width="18" height="6" fill="#111111"/>
                <rect x="4" y="4" width="4" height="14" fill="#111111"/>
                <rect x="22" y="4" width="4" height="14" fill="#111111"/>
                <rect x="8" y="4" width="4" height="4" fill="#111111"/> <rect x="10" y="9" width="2" height="2" fill="#111111"/>
                <rect x="18" y="9" width="2" height="2" fill="#111111"/>
            </svg>
        </div>

        <div class="envelope"></div>

        <div class="message-modal">
            <div class="message-header">✉ TOP SECRET CLASSIFIED</div>
            <div class="message-body">Agent, your instructions are clear:

Have an amazing day! You are crushing it. Keep up the great work. 🕵️‍♂️

[YOUR MESSAGE HERE]

End of Transmission.<span class="cursor"></span></div>
        </div>

        <div class="scanlines"></div>
    </div>

</body>
</html>
