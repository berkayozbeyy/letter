<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Letter Website</title>

  <style>
    body {
      margin: 0;
      background: #f8f1e7;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: cursive;
      overflow-y: auto;
      padding: 50px 0;
    }

    .container {
      position: relative;
      text-align: center;
      cursor: pointer;
      width: 1300px;
      height: 1500px;
    }

    .envelope {
      width: 1200px;
      height: 800px;
      background: #efe3d2;
      border-radius: 30px;
      position: absolute;
      left: 50%;
      top: 400px;
      transform: translateX(-50%);
      transition: all 1s ease;
      box-shadow: 0 20px 50px rgba(0,0,0,0.08);
      z-index: 2;
    }

    .flap {
      position: absolute;
      width: 100%;
      height: 400px;
      background: #e5d3bc;
      top: 0;
      left: 0;
      transform-origin: top;
      transition: transform 1s ease;
      border-radius: 30px 30px 0 0;
    }

    .message {
      position: absolute;
      width: 100%;
      top: 50%;
      transform: translateY(-50%);
      color: #5c4b3b;
      font-size: 70px;
    }

    .photo {
      width: 960px;
      height: 1200px;
      background: white;
      border-radius: 30px;
      padding: 30px;
      position: absolute;
      left: 50%;
      top: 350px;
      transform: translateX(-50%) translateY(30px);
      opacity: 0;
      transition: all 1.2s ease;
      box-shadow: 0 20px 50px rgba(0,0,0,0.15);
      z-index: 1;
    }

    .photo img {
      width: 100%;
      height: 900px;
      object-fit: cover;
      border-radius: 20px;
    }

    .photo-text {
      margin-top: 40px;
      color: #444;
      font-size: 60px;
    }

    .bottom-text {
      position: absolute;
      bottom: 20px;
      width: 100%;
      color: #6a5846;
      font-size: 70px;
    }

    .opened .flap {
      transform: rotateX(-150deg);
    }

    .opened .photo {
      transform: translateX(-50%) translateY(0px);
      opacity: 1;
      z-index: 3;
    }

    .opened .envelope {
      transform: translateX(-50%) translateY(200px);
      opacity: 0;
    }

    /* --- MOBILE STYLES (Targets screens like iPhone 11) --- */
    @media (max-width: 768px) {
      body {
        padding: 20px 0;
      }

      .container {
        width: 90vw; /* Takes up 90% of the screen width */
        height: 140vw; /* Keeps proportional height */
      }

      .envelope {
        width: 100%;
        height: 65%;
        top: 25%;
        border-radius: 15px;
      }

      .flap {
        height: 50%;
        border-radius: 15px 15px 0 0;
      }

      .message {
        font-size: 22px; /* Smaller, readable text on mobile */
      }

      .photo {
        width: 85%;
        height: 105%;
        top: 15%;
        padding: 15px;
        border-radius: 15px;
        transform: translateX(-50%) translateY(20px);
      }

      .photo img {
        height: 75%;
        border-radius: 10px;
      }

      .photo-text {
        margin-top: 15px;
        font-size: 20px;
      }

      .bottom-text {
        font-size: 24px;
        bottom: 10px;
      }

      .opened .envelope {
        transform: translateX(-50%) translateY(100px);
      }

      .opened .photo {
        transform: translateX(-50%) translateY(0px);
      }
    }
  </style>
</head>

<body>

<div class="container" onclick="openLetter()" id="letterBox">

  <div class="photo">
    <img src="your-photo.jpg" alt="memory">
    <div class="photo-text">Forever with you</div>
  </div>

  <div class="envelope">
    <div class="flap"></div>
    <div class="message">Click to open my letter</div>
  </div>

  <div class="bottom-text">A special message for you</div>

</div>

<script>
  function openLetter() {
    document.getElementById("letterBox").classList.add("opened");
  }
</script>

</body>
</html>
