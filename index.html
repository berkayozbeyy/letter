<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Letter</title>
  <style>
    body {
      margin: 0;
      background: #f8f1e7;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: cursive;
    }

    .container {
      position: relative;
      text-align: center;
      cursor: pointer;
    }

    .envelope {
      width: 420px;
      height: 280px;
      background: #efe3d2;
      border-radius: 12px;
      position: relative;
      transition: all 1s ease;
    }

    .flap {
      position: absolute;
      width: 100%;
      height: 140px;
      background: #e5d3bc;
      top: 0;
      left: 0;
      transform-origin: top;
      transition: transform 1s ease;
      border-radius: 12px 12px 0 0;
    }

    .message {
      position: absolute;
      width: 100%;
      top: 50%;
      transform: translateY(-50%);
      color: #5c4b3b;
      font-size: 28px;
    }

    .photo {
      width: 300px;
      height: 380px;
      background: white;
      border-radius: 16px;
      padding: 10px;
      position: absolute;
      left: 50%;
      transform: translateX(-50%) translateY(40px);
      opacity: 0;
      transition: all 1.2s ease;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    .photo img {
      width: 100%;
      height: 240px;
      object-fit: cover;
      border-radius: 10px;
    }

    .photo-text {
      margin-top: 10px;
      color: #444;
      font-size: 22px;
    }

    .opened .flap {
      transform: rotateX(-150deg);
    }

    .opened .photo {
      transform: translateX(-50%) translateY(-50px);
      opacity: 1;
    }

    .opened .envelope {
      transform: translateY(120px);
      opacity: 0;
    }

    .bottom-text {
      margin-top: 240px;
      color: #6a5846;
      font-size: 32px;
    }
  </style>
</head>

<body>

<div class="container" onclick="openLetter()" id="letterBox">

  <div class="photo">
    <img src="your-photo.jpg" alt="memory">
    <div class="photo-text">Forever with you</div>
  </div>

  <div class="envelope">
    <div class="flap"></div>
    <div class="message">Click to open my letter</div>
  </div>

  <div class="bottom-text">My heart has a message for you</div>

</div>

<script>
  function openLetter() {
    document.getElementById("letterBox").classList.add("opened");
  }
</script>

</body>
</html>
